name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        working-directory: .
        run: npm ci

      - name: Generate Prisma client
        working-directory: .
        run: npx prisma generate

      - name: Type check
        working-directory: .
        run: npx tsc --noEmit

      - name: Lint
        working-directory: .
        run: npx eslint .

  unit-tests:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint-and-type-check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        working-directory: .
        run: npm ci

      - name: Generate Prisma client
        working-directory: .
        run: npx prisma generate

      - name: Run Vitest
        working-directory: .
        run: npx vitest run --reporter=verbose --coverage
        env:
          DATABASE_URL: "mysql://test:test@localhost:3306/dental_test"
          NEXTAUTH_SECRET: "ci-test-secret-at-least-32-chars-long"
          NEXTAUTH_URL: "http://localhost:3000"
          CRON_SECRET: "ci-cron-secret"
          ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: lint-and-type-check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        working-directory: .
        run: npm ci

      - name: Generate Prisma client
        working-directory: .
        run: npx prisma generate

      - name: Build
        working-directory: .
        run: npm run build
        env:
          DATABASE_URL: "mysql://test:test@localhost:3306/dental_test"
          NEXTAUTH_SECRET: "ci-test-secret-at-least-32-chars-long"
          NEXTAUTH_URL: "http://localhost:3000"

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: dental_test
          MYSQL_USER: test
          MYSQL_PASSWORD: test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        working-directory: .
        run: npm ci

      - name: Generate Prisma client
        working-directory: .
        run: npx prisma generate

      - name: Push schema to test DB
        working-directory: .
        run: npx prisma db push --accept-data-loss
        env:
          DATABASE_URL: "mysql://test:test@localhost:3306/dental_test"

      - name: Seed test data
        working-directory: .
        run: npx prisma db seed
        env:
          DATABASE_URL: "mysql://test:test@localhost:3306/dental_test"

      - name: Install Playwright browsers
        working-directory: .
        run: npx playwright install --with-deps chromium firefox

      - name: Run Playwright tests
        working-directory: .
        run: npx playwright test
        env:
          DATABASE_URL: "mysql://test:test@localhost:3306/dental_test"
          NEXTAUTH_SECRET: "ci-test-secret-at-least-32-chars-long"
          NEXTAUTH_URL: "http://localhost:3000"
          CRON_SECRET: "ci-cron-secret"
          ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
